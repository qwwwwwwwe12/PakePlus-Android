<!DOCTYPE html>
<html>
<head><title>音频测试</title></head>
<body>
<button id="btn">点我播放 attack.wav</button>
<script>
document.getElementById('btn').onclick = () => {
    let audio = new Audio('./sounds/attack.wav');
    audio.play().then(() => console.log('播放成功')).catch(e => console.error('播放失败', e));
};
</script>
</body>
</html>
